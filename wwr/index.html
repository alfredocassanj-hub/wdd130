<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description"
      content="Experience thrilling white water rafting adventures with our expert guides.">
    <meta name="author" content="Alfredo Cassanje">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | White Water Rafting</title>

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <!-- HEADER -->
    <header>
        <img src="images/logo.png" alt="Rafting Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main>

        <!-- HERO --->
        <section class="hero">
            <img src="images/hero1.jpg" alt="Rafting Adventure">
            <div class="hero-content">
                <h1>Have An Adventure</h1>
                <a href="trips.html" class="btn">Book Now</a>
            </div>
        </section>

        <!-- FEATURES (3 COLUNAS) -->
        <section class="features">
            <div>
                <img src="images/river.jpg" alt="Rivers">
                <h3>Rivers</h3>
            </div>

            <div>
                <img src="images/camping.jpg" alt="Camping">
                <h3>Camping</h3>
            </div>

            <div>
                <img src="images/rapids.jpg" alt="Rapids">
                <h3>Rapids</h3>
            </div>
        </section>

        <!-- CTA SECTION -->
        <section class="cta-section">
            <div class="cta-container">
                <img src="images/mountain.jpg" alt="Nature landscape">
                <div class="cta-text">
                    <h2>More Than Just The Thrill</h2>
                    <p>
                        Enjoy breathtaking scenery and unforgettable experiences in nature.
                    </p>
                    <a href="trips.html" class="btn">Join Us</a>
                </div>
            </div>
        </section>

        <!-- NEWSLETTER -->
        <section class="newsletter">
            <h2>Subscribe to our Newsletter</h2>

            <form>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <button type="submit">Subscribe Now</button>
            </form>
        </section>

    </main>

    <!-- FOOTER --->
    <footer>
        <p>&copy; 2026 White Water Rafting | Alfredo Cassanje</p>
    </footer>

</body>

</html>
