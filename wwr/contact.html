<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description"
      content="Contact White Water Rafting for reservations, questions, and adventure planning.">
    <meta name="author" content="Alfredo Albino António Cassanje">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <!-- HEADER -->
    <header>
        <img src="images/logo.png" alt="Rafting Logo">

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>

        <!-- COMPANY INFO -->
        <section class="contact-info">
            <h1>White Water Rafting Company</h1>
            <p>123 Main River Street</p>
            <p>Kolob, California</p>
            <p>+1 999 999 9999</p>
            <p>info@whitewater.com</p>
        </section>

        <!-- MAP + FORM -->
        <section class="contact-container">

            <!-- MAP -->
            <div class="map">
                <iframe src="https://www.google.com/maps?q=Kolob,California&output=embed"></iframe>
            </div>

            <!-- FORM ---->

            <form>

                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>

                <p>Message Purpose</p>
                <label for="general">
                    <input type="radio" id="general" name="purpose" value="general"> General
                    Inquiry
                </label>
                <label for="reservation">
                    <input type="radio" id="reservation" name="purpose" value="reservation">
                    Reservation
                    Question
                </label>
                <label for="suggestion">
                    <input type="radio" id="suggestion" name="purpose" value="suggestion">
                    Website Suggestion
                </label>

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="4" required></textarea>

                <label for="newsletter">
                    <input type="checkbox" id="newsletter" name="newsletter">
                    Please subscribe me to the monthly newsletter
                </label>

                <button type="submit">Get in Touch!</button>
            </form>


        </section>

        <!-- EMPLOYEES -->
        <section class="employees">
            <h2>We Are Here to Serve You</h2>

            <figure>
                <img src="images/employee1.jpg" alt="River Guide">
                <figcaption>John – River Guide</figcaption>
            </figure>

            <figure>
                <img src="images/employee2.jpg" alt="Manager">
                <figcaption>Sarah – Manager</figcaption>
            </figure>

            <figure>
                <img src="images/employee3.jpg" alt="Instructor">
                <figcaption>Mike – Instructor</figcaption>
            </figure>

        </section>

    </main>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 White Water Rafting | Alfredo Cassanje</p>

        <nav class="socialmedia">
            <a href="#"><img src="images/facebook.jpg" alt="Facebook"></a>
            <a href="#"><img src="images/instagram.jpg" alt="Instagram"></a>
            <a href="#"><img src="images/tiktok.jpg" alt="TikTok"></a>
        </nav>
    </footer>

</body>

</html>
