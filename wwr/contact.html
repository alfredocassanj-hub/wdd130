<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="description"
      content="Contact White Water Rafting for reservations, questions, or suggestions.">

    <!-- ✅ FIX: author (OBRIGATÓRIO) -->
    <meta name="author" content="Alfredo Cassanje">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact Us | White Water Rafting</title>

    <!-- CSS correto -->
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <div class="page-wrapper">

        <!-- HEADER -->
        <header>
            <img src="images/logo.png" alt="Rafting Logo">

            <nav>
                <a href="index.html">Home</a>
                <a href="about.html">About Us</a>
                <a href="trips.html">Trips</a>
                <a href="contact.html">Contact Us</a>
            </nav>
        </header>

        <!-- MAIN -->
        <main>

            <!-- COMPANY INFO -->
            <section class="company-info">
                <h1>White Water Rafting Company</h1>
                <p>123 Main River Street</p>
                <p>Kolob, California</p>
                <p>+1 999 999 9999</p>
                <p>info@whitewater.com</p>
            </section>

            <!-- CONTACT -->
            <section class="contact-container">

                <!-- MAP -->
                <div class="map">
                    <iframe src="https://www.google.com/maps?q=Kolob,Utah&output=embed"
                      loading="lazy">
                    </iframe>
                </div>

                <!-- FORM (FIX COMPLETO) -->
                <form class="contact-form">

                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>

                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>

                    <p>Message Purpose</p>

                    <label>
                        <input type="radio" id="general" name="purpose">
                        General Inquiry
                    </label>

                    <label>
                        <input type="radio" id="reservation" name="purpose">
                        Reservation Question
                    </label>

                    <label>
                        <input type="radio" id="website" name="purpose">
                        Website Suggestion
                    </label>

                    <label for="message">Message</label>
                    <textarea id="message" name="message"></textarea>

                    <label>
                        <input type="checkbox" id="newsletter" name="newsletter">
                        Please subscribe me to the monthly newsletter
                    </label>

                    <button type="submit">Get in Touch!</button>

                </form>

            </section>

            <!-- TEAM -->
            <section class="team">

                <h2>We Are Here to Serve You</h2>

                <div class="team-container">

                    <figure>
                        <img src="images/employees1.jpg" alt="Manager">
                        <figcaption>John Smith - Manager</figcaption>
                    </figure>

                    <figure>
                        <img src="images/employees2.jpg" alt="Guide">
                        <figcaption>Mary Johnson - River Guide</figcaption>
                    </figure>

                    <figure>
                        <img src="images/employees3.jpg" alt="Support">
                        <figcaption>David Lee - Support Staff</figcaption>
                    </figure>

                </div>

            </section>

        </main>

        <!-- FOOTER (FIX FINAL) -->
        <footer>

            <p>© 2026 White Water Rafting - Alfredo Cassanje</p>

            <nav class="socialmedia">
                <a href="#"><img src="images/facebook.jpg" alt="Facebook"></a>
                <a href="#"><img src="images/instagram.jpg" alt="Instagram"></a>
                <a href="#"><img src="images/twitter.png" alt="Twitter"></a>
            </nav>

        </footer>

    </div>

</body>

</html>
