<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description"
      content="Contact White Water Rafting for inquiries, reservations, and suggestions.">
    <meta name="author" content="Alfredo Albino António Cassanje">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <img src="images/logo.png" alt="Rafting Logo" class="logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html" class="active">Contact Us</a>
        </nav>
    </header>

    <main>
        <!-- COMPANY INFO -->
        <section class="company-info">
            <h1>White Water Rafting Company</h1>
            <p>123 Main River Street</p>
            <p>Kolob, California</p>
            <p>+1 999 999 9999</p>
            <p>info@whitewater.com</p>
        </section>

        <!-- MAP + FORM -->
        <section class="contact-layout">
            <div class="map">
                <iframe
                  src="https://maps.google.com/maps?q=California&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
            </div>

            <div class="contact-form">
                <form>
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>

                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>

                    <p><strong>Message Purpose</strong></p>
                    <div class="radio-group">
                        <label><input type="radio" name="purpose" value="general" required> General
                            Inquiry</label>
                        <label><input type="radio" name="purpose" value="reservation"> Reservation
                            Question</label>
                        <label><input type="radio" name="purpose" value="suggestion"> Website
                            Suggestion</label>
                    </div>

                    <label for="message">Message</label>
                    <textarea id="message" name="message"></textarea>

                    <div class="newsletter">
                        <label><input type="checkbox" name="newsletter"> Please subscribe me to the
                            monthly newsletter</label>
                    </div>

                    <button type="submit">Get in Touch!</button>
                </form>
            </div>
        </section>

        <!-- EMPLOYEES BOX -->
        <section class="employees-box">
            <h2>We Are Here to Serve You</h2>
            <div class="employees">
                <div class="employee-profile">
                    <img src="images/employees1.jpg" alt="John - Manager">
                    <p>John – Manager</p>
                </div>
                <div class="employee-profile">
                    <img src="images/employees2.jpg" alt="Alfredo - River Guide">
                    <p>Anna – River Guide</p>
                </div>
                <div class="employee-profile">
                    <img src="images/employees3.jpg" alt="Mike - Support Staff">
                    <p>Mike – Support Staff</p>
                </div>
            </div>
        </section>
    </main>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 White Water Rafting | Alfredo Cassanje</p>
        <div class="social-icons">
            <img src="images/facebook.jpg" alt="Facebook">
            <img src="images/instagram.jpg" alt="Instagram">
            <img src="images/twitter1.png" alt="Twitter">
        </div>
    </footer>

</body>

</html>
