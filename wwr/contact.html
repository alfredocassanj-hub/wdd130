<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description"
      content="Contact White Water Rafting for reservations, questions, or suggestions.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting</title>

    <!-- IMPORTANTE: usa o mesmo CSS -->
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <img src="images/logo.png" alt="Rafting Logo">

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>

        <!-- COMPANY INFO -->
        <section class="company-info">
            <h1>White Water Rafting Company</h1>
            <p>123 Main River Street</p>
            <p>Kolob, California</p>
            <p>+1 999 999 9999</p>
            <p>info@whitewater.com</p>
        </section>

        <!-- CONTACT AREA -->
        <section class="contact-container">

            <!-- MAP -->
            <div class="map">
                <iframe src="https://www.google.com/maps?q=Kolob,Utah&output=embed" loading="lazy">
                </iframe>
            </div>

            <!-- FORM -->
            <form class="contact-form">

                <label for="name">Name</label>
                <input type="text" id="name" required>

                <label for="email">Email</label>
                <input type="email" id="email" required>

                <p>Message Purpose</p>

                <label><input type="radio" name="purpose" required> General Inquiry</label>
                <label><input type="radio" name="purpose"> Reservation Question</label>
                <label><input type="radio" name="purpose"> Website Suggestion</label>

                <label for="message">Message</label>
                <textarea id="message" required></textarea>

                <label class="checkbox">
                    <input type="checkbox">
                    Please subscribe me to the monthly newsletter
                </label>

                <button type="submit">Get in Touch!</button>

            </form>
        </section>

        <!-- TEAM -->
        <section class="team">
            <h2>We Are Here to Serve You</h2>

            <div class="team-container">

                <figure>
                    <img src="images/employees1.jpg" alt="Manager">
                    <figcaption>John Smith - Manager</figcaption>
                </figure>

                <figure>
                    <img src="images/employees2.jpg" alt="Guide">
                    <figcaption>Mary Johnson - River Guide</figcaption>
                </figure>

                <figure>
                    <img src="images/employees3.jpg" alt="Support">
                    <figcaption>David Lee - Support Staff</figcaption>
                </figure>

            </div>
        </section>

    </main>

    <footer>
        <p>© 2026 White Water Rafting - Alfredo Cassanje</p>

        <div class="social">
            <a href="#"><img src="images/facebook.jpg" alt="Facebook"></a>
            <a href="#"><img src="images/instagram.jpg" alt="Instagram"></a>
            <a href="#"><img src="images/twitter.png" alt="Twitter"></a>
        </div>
    </footer>

</body>

</html>
